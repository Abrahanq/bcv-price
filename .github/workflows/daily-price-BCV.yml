name: Precio diario

on:
  schedule:
    - cron: '30 21 * * *' # Primer intento: 21:30 UTC (5:00pm Venezuela)
    - cron: '0 22 * * 1-5' # Reintento: 22:00 UTC (5:30pm Venezuela) entre semana
  workflow_dispatch:  # Allows manual triggering

jobs:
  extrayendo_dato:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - name: Identificar si es reintento
        id: schedule-check
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "22" ]; then
            echo "is_retry=true" >> $GITHUB_OUTPUT
            echo "⚠️ Este es un reintento (30min después)"
          else
            echo "is_retry=false" >> $GITHUB_OUTPUT
            echo "✓ Primer intento"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Descargar precios USD y EUR
        run: |
          chmod +x get_prices.sh
          bash get_prices.sh
          if [ ! -s prices.csv ]; then
            echo "CSV file is empty"
            exit 1
          fi

      - name: Convertir CSV a JSON
        run: |
          python3 csv_to_json.py
          if [ ! -s prices.json ]; then
            echo "JSON file is empty"
            exit 1
          fi

      - name: Commit results
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add prices.csv prices.json
          
          # Si NO hay cambios, salir
          if git diff --cached --quiet; then
            if [ "${{ steps.schedule-check.outputs.is_retry }}" = "true" ]; then
              echo "✓ Precio ya fue actualizado en el primer intento"
            else
              echo "✓ No hay cambios nuevos (fecha ya registrada)"
            fi
            exit 0
          fi
          
          # Hacer commit ANTES de pull --rebase
          git commit -m "Precios actualizados"
          
          # Ahora sí hacer pull --rebase (sin cambios uncommitted)
          git pull --rebase origin main || {
            echo "Error en pull --rebase"
            exit 1
          }
          
          # Push de los commits
          git push origin main
          echo "✓ Cambios guardados"